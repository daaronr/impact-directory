<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1D5FA6" />
    <title>Impact Directory — Organizations & Products with Verified Impact Claims</title>
    <meta name="description" content="A searchable directory of organizations and offerings with meaningful social or environmental commitments — verified impact claims, not just branding." />
    <link rel="canonical" href="https://impact-products-directory.netlify.app/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Impact Directory" />
    <meta property="og:title" content="Impact Directory — Organizations & Products with Verified Impact Claims" />
    <meta property="og:description" content="A searchable directory of organizations and offerings with meaningful social or environmental commitments — verified impact claims, not just branding." />
    <meta property="og:url" content="https://impact-products-directory.netlify.app/" />
    <meta property="og:image" content="https://impact-products-directory.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Impact Directory — Verified Impact Claims" />
    <meta name="twitter:description" content="Searchable directory of organizations and offerings with verified social/environmental impact claims." />
    <meta name="twitter:image" content="https://impact-products-directory.netlify.app/og-image.png" />

    <!-- Google Search Console ownership verification (HTML tag method) -->
    <meta name="google-site-verification" content="A8fMpcOFq0z-XHX6kDKHRmleSnnS_U-42OrzK8pFAXI" />
    <!-- Bing: add an msvalidate.01 token here if you verify with Bing Webmaster Tools -->
    <!-- Cloudflare Web Analytics — set VITE_CF_ANALYTICS_TOKEN in Netlify env vars to activate -->
    <script>
      (function() {
        var token = '%VITE_CF_ANALYTICS_TOKEN%';
        if (token && token !== '%VITE_CF_ANALYTICS_TOKEN%' && token.length > 10) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
          s.setAttribute('data-cf-beacon', JSON.stringify({ token: token }));
          document.head.appendChild(s);
        }
      })();
    </script>
    <!-- Hypothes.is annotation sidebar — lets visitors highlight and annotate any text -->
    <script src="https://hypothes.is/embed.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
